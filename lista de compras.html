<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Lista de Compras Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .pending { border-left: 5px solid #ef4444; }
    .bought { border-left: 5px solid #22c55e; }
    .item-card { transition: all 0.3s; }
    #login-overlay { backdrop-filter: blur(10px); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen pb-28">

  <!-- Tela de Login -->
  <div id="login-overlay" class="fixed inset-0 bg-blue-900/90 z-[1000] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl text-center">
      <i class="fas fa-shopping-basket text-5xl text-blue-600 mb-4"></i>
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Acesso à Lista</h2>
      <input id="login-user" type="text" placeholder="Usuário" class="w-full px-5 py-4 border rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
      <input id="login-pass" type="password" placeholder="Senha" class="w-full px-5 py-4 border rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-blue-500">
      <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition">Entrar</button>
      <p id="login-error" class="text-red-500 mt-4 hidden text-sm">Credenciais inválidas!</p>
    </div>
  </div>

  <div id="app-content" class="hidden">
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg sticky top-0 z-50">
      <div class="max-w-2xl mx-auto px-4 py-5">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <i class="fas fa-shopping-basket text-3xl"></i>
            <div>
              <h1 class="text-2xl font-bold">Lista de Compras</h1>
              <p id="list-name" class="text-sm opacity-90">Carregando...</p>
            </div>
          </div>
          <div class="flex gap-2">
            <!-- Novo botão de Histórico -->
            <button onclick="showHistoryModal()" class="p-3 hover:bg-white/20 rounded-2xl" title="Histórico">
              <i class="fas fa-history text-xl"></i>
            </button>
            <button onclick="saveList()" class="p-3 hover:bg-white/20 rounded-2xl">
              <i class="fas fa-save"></i>
            </button>
          </div>
        </div>

        <!-- Barra de Pesquisa -->
        <div class="relative">
          <input id="searchInput" 
                 type="text" 
                 placeholder="Pesquisar produto..." 
                 onkeyup="filterList()"
                 class="w-full px-5 py-4 pl-12 border border-transparent bg-white/20 backdrop-blur rounded-3xl text-white placeholder-white/70 focus:outline-none focus:bg-white/30">
          <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-white/70"></i>
        </div>
      </div>
    </header>

    <div class="max-w-2xl mx-auto px-4 py-6">
      <div id="shopping-list" class="space-y-4"></div>
    </div>

    <!-- Botão Flutuante Adicionar -->
    <button onclick="showAddModal()" 
            class="fixed bottom-32 right-6 bg-blue-600 hover:bg-blue-700 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-4xl z-50">
      <i class="fas fa-plus"></i>
    </button>

    <!-- Total e Finalizar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-2xl max-w-2xl mx-auto z-[60]">
      <div class="px-6 py-4">
        <div class="flex justify-between items-center mb-4">
          <div>
            <p class="text-xs text-gray-500">TOTAL DA COMPRA</p>
            <p id="total" class="text-3xl font-bold text-green-600">R$ 0,00</p>
          </div>
          <button onclick="showFinalizeModal()" 
                  class="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-2xl font-semibold flex items-center gap-2 shadow-lg">
            <i class="fas fa-check-circle"></i>
            FINALIZAR
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Adicionar / Editar -->
  <div id="addModal" class="hidden fixed inset-0 bg-black/60 flex items-end z-[100]">
    <div class="bg-white w-full rounded-t-3xl max-w-2xl mx-auto">
      <div class="p-6">
        <h2 id="modalTitle" class="text-xl font-semibold mb-6">Novo Item</h2>
        <input id="item-name" type="text" placeholder="Nome do produto" class="w-full px-5 py-4 border rounded-2xl text-lg mb-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm text-gray-500">Quantidade</label>
            <input id="item-qty" type="number" step="0.01" value="1" class="w-full px-5 py-4 border rounded-2xl">
          </div>
          <div>
            <label class="text-sm text-gray-500">Unidade</label>
            <select id="item-unit" class="w-full px-5 py-4 border rounded-2xl">
              <option value="un">un</option>
              <option value="kg">kg</option>
              <option value="g">g</option>
              <option value="L">L</option>
              <option value="pacote">pacote</option>
            </select>
          </div>
        </div>
        <div class="mt-4">
          <label class="text-sm text-gray-500">Preço Unitário (R$)</label>
          <input id="item-price" type="number" step="0.01" placeholder="0,00" class="w-full px-5 py-4 border rounded-2xl text-lg">
        </div>
        <select id="item-category" class="w-full px-5 py-4 border rounded-2xl mt-4">
          <option value="Frutas">Frutas</option>
          <option value="Legumes e Verduras">Legumes e Verduras</option>
          <option value="Laticínios">Laticínios</option>
          <option value="Carnes e Peixes">Carnes e Peixes</option>
          <option value="Padaria">Padaria</option>
          <option value="Bebidas">Bebidas</option>
          <option value="Higiene e Limpeza">Higiene e Limpeza</option>
          <option value="Congelados">Congelados</option>
          <option value="Enlatados">Enlatados</option>
          <option value="Grãos e Cereais">Grãos e Cereais</option>
          <option value="Outros">Outros</option>
        </select>
        <div class="flex gap-4 mt-8">
          <button onclick="hideAddModal()" class="flex-1 py-4 border rounded-2xl font-medium">Cancelar</button>
          <button onclick="saveItem()" id="saveButton" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-medium">Adicionar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Preço Rápido -->
  <div id="priceModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200]">
    <div class="bg-white rounded-3xl p-8 max-w-xs w-full mx-4">
      <h3 id="priceItemName" class="font-semibold text-lg mb-4"></h3>
      <input id="priceInput" type="number" step="0.01" placeholder="Valor pago (R$)" class="w-full px-6 py-5 text-3xl border rounded-2xl text-center font-bold">
      <div class="flex gap-3 mt-8">
        <button onclick="cancelPriceModal()" class="flex-1 py-4 border rounded-2xl">Cancelar</button>
        <button onclick="confirmPrice()" class="flex-1 py-4 bg-green-600 text-white rounded-2xl">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Modal Renomear Lista (Substitui Prompt) -->
  <div id="renameModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[500]">
    <div class="bg-white rounded-3xl p-8 max-w-xs w-full mx-4">
      <h3 class="font-semibold text-lg mb-4 text-gray-800">Nome da Lista</h3>
      <input id="newListNameInput" type="text" class="w-full px-5 py-4 border rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-blue-500">
      <div class="flex gap-3">
        <button onclick="hideRenameModal()" class="flex-1 py-4 border rounded-2xl font-medium">Cancelar</button>
        <button onclick="confirmRename()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal Alerta Lista Vazia (Substitui Alert) -->
  <div id="emptyWarningModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[600]">
    <div class="bg-white rounded-3xl p-8 max-w-xs w-full mx-4 text-center">
      <div class="w-16 h-16 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h3 class="text-xl font-bold mb-2">Lista Vazia!</h3>
      <p class="text-gray-500 mb-8">Adicione pelo menos um item antes de finalizar.</p>
      <button onclick="hideEmptyWarning()" class="w-full py-4 bg-gray-800 text-white rounded-2xl font-bold">Entendido</button>
    </div>
  </div>

  <!-- Modal Finalizar Compra -->
  <div id="finalizeModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[300]">
    <div class="bg-white rounded-3xl p-8 max-sm w-full mx-4 text-center">
      <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner">
        <i class="fas fa-shopping-cart"></i>
      </div>
      <h3 class="text-2xl font-bold mb-2">Finalizar Compra?</h3>
      <p id="finalizeSummary" class="text-gray-500 mb-8"></p>
      <div class="flex flex-col gap-3">
        <button onclick="confirmFinalize()" class="w-full py-4 bg-green-600 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2">
          <i class="fab fa-whatsapp"></i> Continuar e Enviar
        </button>
        <button onclick="closeFinalizeModal()" class="w-full py-4 border border-gray-200 rounded-2xl font-medium text-gray-600">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Modal Histórico -->
  <div id="historyModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[400] p-4">
    <div class="bg-white rounded-3xl w-full max-w-md max-h-[80vh] flex flex-col overflow-hidden">
      <div class="p-6 border-b flex justify-between items-center">
        <h3 class="text-xl font-bold text-gray-800">Listas Anteriores</h3>
        <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
      </div>
      <div id="history-content" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50"></div>
      <div class="p-4 border-t bg-white">
        <button onclick="closeHistoryModal()" class="w-full py-3 bg-gray-100 text-gray-600 rounded-2xl font-medium">Fechar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { database, ref, push, update, onValue, remove, set, get } from './bd.js';

    let items = [];
    let listName = "Lista de Compras";
    let editingItemId = null;
    let priceEditingId = null;
    let currentSearch = '';

    // --- LOGIN LOGIC ---
    window.handleLogin = async () => {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value.trim();
      const errorEl = document.getElementById('login-error');
      if(!user || !pass) return;
      const userRef = ref(database, 'users/' + user);
      const snapshot = await get(userRef);
      if (snapshot.exists()) {
        if (snapshot.val().password === pass) {
          enterApp();
        } else {
          errorEl.classList.remove('hidden');
        }
      } else {
        if (user === "ericlm" && pass === "Evo@0101") {
          await set(userRef, { password: pass });
          enterApp();
        } else {
          errorEl.classList.remove('hidden');
        }
      }
    };

    function enterApp() {
      document.getElementById('login-overlay').classList.add('hidden');
      document.getElementById('app-content').classList.remove('hidden');
      loadFromFirebase();
    }

    // --- FIREBASE SYNC ---
    function loadFromFirebase() {
      onValue(ref(database, 'shoppingList'), (snapshot) => {
        const data = snapshot.val();
        items = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
        renderList();
      });
      onValue(ref(database, 'listName'), (snapshot) => {
        listName = snapshot.val() || "Lista de Compras";
        document.getElementById('list-name').textContent = listName;
      });
    }

    window.saveItem = async () => {
      const name = document.getElementById('item-name').value.trim();
      if (!name) return alert("Digite o nome do item");
      const qty = parseFloat(document.getElementById('item-qty').value) || 1;
      const unit = document.getElementById('item-unit').value;
      const category = document.getElementById('item-category').value;
      const priceInput = parseFloat(document.getElementById('item-price').value);
      const itemData = {
        name,
        qty,
        unit,
        category,
        price: (priceInput && priceInput > 0) ? priceInput : null,
        subtotal: (priceInput && priceInput > 0) ? qty * priceInput : null,
        bought: !!(priceInput && priceInput > 0)
      };
      if (editingItemId) {
        await update(ref(database, `shoppingList/${editingItemId}`), itemData);
      } else {
        await push(ref(database, 'shoppingList'), itemData);
      }
      hideAddModal();
    };

    window.removeItem = (id) => {
      if (confirm("Remover este item?")) {
        remove(ref(database, `shoppingList/${id}`));
      }
    };

    window.toggleBought = (id) => {
      const item = items.find(i => i.id === id);
      if (!item) return;
      if (!item.bought) {
        priceEditingId = id;
        document.getElementById('priceItemName').textContent = item.name;
        document.getElementById('priceInput').value = item.price || '';
        document.getElementById('priceModal').classList.remove('hidden');
        document.getElementById('priceInput').focus();
      } else {
        update(ref(database, `shoppingList/${id}`), { bought: false, subtotal: null });
      }
    };

    window.confirmPrice = () => {
      const price = parseFloat(document.getElementById('priceInput').value);
      if (!price || price <= 0) return alert("Digite um valor válido");
      const item = items.find(i => i.id === priceEditingId);
      if (item) {
        update(ref(database, `shoppingList/${priceEditingId}`), {
          price: price,
          subtotal: item.qty * price,
          bought: true
        });
      }
      cancelPriceModal();
    };

    // --- MODAL NOME DA LISTA ---
    window.saveList = () => {
      document.getElementById('newListNameInput').value = listName;
      document.getElementById('renameModal').classList.remove('hidden');
    };

    window.hideRenameModal = () => document.getElementById('renameModal').classList.add('hidden');

    window.confirmRename = () => {
      const newName = document.getElementById('newListNameInput').value.trim();
      if (newName) {
        set(ref(database, 'listName'), newName);
        hideRenameModal();
      }
    };

    // --- UI FUNCTIONS ---
    window.showAddModal = (isEdit = false, id = null) => {
      const modal = document.getElementById('addModal');
      modal.classList.remove('hidden');
      document.getElementById('modalTitle').textContent = isEdit ? "Editar Item" : "Novo Item";
      document.getElementById('saveButton').textContent = isEdit ? "Salvar Alterações" : "Adicionar";
      if (isEdit && id) {
        const item = items.find(i => i.id === id);
        editingItemId = id;
        document.getElementById('item-name').value = item.name;
        document.getElementById('item-qty').value = item.qty;
        document.getElementById('item-unit').value = item.unit;
        document.getElementById('item-price').value = item.price || '';
        document.getElementById('item-category').value = item.category;
      } else {
        editingItemId = null;
        document.getElementById('item-name').value = '';
        document.getElementById('item-qty').value = '1';
        document.getElementById('item-unit').value = 'un';
        document.getElementById('item-price').value = '';
        document.getElementById('item-category').value = 'Outros';
      }
    };

    window.hideAddModal = () => document.getElementById('addModal').classList.add('hidden');
    window.cancelPriceModal = () => document.getElementById('priceModal').classList.add('hidden');
    window.editItem = (id) => showAddModal(true, id);
    window.filterList = () => {
      currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
      renderList();
    };

    window.renderList = () => {
      const container = document.getElementById('shopping-list');
      container.innerHTML = '';
      let filteredItems = items;
      if (currentSearch) {
        filteredItems = items.filter(item => item.name.toLowerCase().includes(currentSearch));
      }
      const grouped = {};
      filteredItems.forEach(item => {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
      });
      if (Object.keys(grouped).length === 0 && currentSearch) {
        container.innerHTML = `<div class="text-center py-12 text-gray-400">Nenhum produto encontrado</div>`;
        updateTotal();
        return;
      }
      Object.keys(grouped).sort().forEach(category => {
        const catItems = grouped[category];
        const div = document.createElement('div');
        div.className = 'bg-white rounded-3xl shadow overflow-hidden mb-4';
        div.innerHTML = `<div class="px-6 py-4 bg-gradient-to-r from-gray-700 to-gray-800 text-white font-semibold">${category}</div><div class="divide-y"></div>`;
        const itemsDiv = div.querySelector('div:last-child');
        catItems.forEach(item => {
          const isBought = item.bought;
          const unitPrice = item.price ? `R$ ${item.price.toFixed(2)}` : '—';
          const totalValue = item.subtotal ? `R$ ${item.subtotal.toFixed(2)}` : '—';
          itemsDiv.innerHTML += `
            <div class="item-card px-6 py-5 flex justify-between items-center ${isBought ? 'bought bg-green-50' : 'pending bg-red-50'}">
              <div class="flex items-center gap-4 flex-1">
                <input type="checkbox" ${isBought ? 'checked' : ''} onchange="toggleBought('${item.id}')" class="w-7 h-7 accent-green-600">
                <div>
                  <p class="font-medium ${isBought ? 'line-through text-gray-500' : 'text-gray-800'}">${item.name}</p>
                  <p class="text-sm text-gray-500">${item.qty} ${item.unit}</p>
                </div>
              </div>
              <div class="text-right text-sm">
                <div><span class="text-gray-500">Unidade:</span> <span class="font-medium">${unitPrice}</span></div>
                <div class="font-bold ${isBought ? 'text-green-600' : 'text-gray-700'}">Total: ${totalValue}</div>
                <div class="flex justify-end gap-3 mt-2">
                  <button onclick="editItem('${item.id}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                  <button onclick="removeItem('${item.id}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                </div>
              </div>
            </div>`;
        });
        container.appendChild(div);
      });
      updateTotal();
    };

    function updateTotal() {
      const total = items.reduce((sum, item) => sum + (item.subtotal || 0), 0);
      document.getElementById('total').textContent = `R$ ${total.toFixed(2)}`;
    }

    // --- FINALIZE FLOW ---
    window.showFinalizeModal = () => {
      if (items.length === 0) {
        document.getElementById('emptyWarningModal').classList.remove('hidden');
        return;
      }
      const total = items.reduce((sum, item) => sum + (item.subtotal || 0), 0);
      const boughtCount = items.filter(i => i.bought).length;
      document.getElementById('finalizeSummary').innerHTML = `Total: <b>R$ ${total.toFixed(2)}</b><br>Itens comprados: ${boughtCount}/${items.length}`;
      document.getElementById('finalizeModal').classList.remove('hidden');
    };

    window.hideEmptyWarning = () => document.getElementById('emptyWarningModal').classList.add('hidden');
    window.closeFinalizeModal = () => document.getElementById('finalizeModal').classList.add('hidden');

    window.confirmFinalize = async () => {
      shareWhatsApp();
      const archiveRef = ref(database, 'history');
      await push(archiveRef, {
        name: listName,
        date: new Date().toLocaleDateString('pt-BR') + ' ' + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
        items: items,
        total: items.reduce((sum, item) => sum + (item.subtotal || 0), 0)
      });
      await remove(ref(database, 'shoppingList'));
      closeFinalizeModal();
    };

    window.shareWhatsApp = () => {
      if (items.length === 0) return;
      let message = `*${listName}*\n\n`;
      const bought = items.filter(i => i.bought);
      const notBought = items.filter(i => !i.bought);
      if (notBought.length > 0) {
        message += `❌ *NÃO COMPRADOS*\n`;
        notBought.forEach(item => message += `⭕ ${item.qty} ${item.unit} - ${item.name}\n`);
        message += `\n`;
      }
      if (bought.length > 0) {
        message += `✅ *COMPRADOS*\n`;
        bought.forEach(item => message += `✅ ${item.qty} ${item.unit} - ${item.name} | Total: R$${item.subtotal.toFixed(2)}\n`);
      }
      const total = items.reduce((sum, item) => sum + (item.subtotal || 0), 0);
      message += `\n*TOTAL GERAL: R$ ${total.toFixed(2)}*`;
      window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
    };

    // --- HISTORY LOGIC ---
    window.showHistoryModal = async () => {
      const snapshot = await get(ref(database, 'history'));
      const historyData = snapshot.val();
      const container = document.getElementById('history-content');
      container.innerHTML = '';
      if (!historyData) {
        container.innerHTML = '<div class="text-center py-10 text-gray-400">Nenhum histórico encontrado</div>';
      } else {
        Object.entries(historyData).reverse().forEach(([id, data]) => {
          const card = document.createElement('div');
          card.className = 'bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center';
          card.innerHTML = `
            <div class="flex-1 cursor-pointer" onclick="loadHistoryList('${id}')">
              <p class="font-bold text-gray-800">${data.name}</p>
              <p class="text-xs text-gray-500">${data.date}</p>
              <p class="text-sm font-semibold text-green-600">R$ ${data.total.toFixed(2)}</p>
            </div>
            <button onclick="deleteHistory('${id}')" class="p-2 text-red-300 hover:text-red-500">
              <i class="fas fa-trash"></i>
            </button>`;
          container.appendChild(card);
        });
      }
      document.getElementById('historyModal').classList.remove('hidden');
    };

    window.closeHistoryModal = () => document.getElementById('historyModal').classList.add('hidden');

    window.deleteHistory = async (id) => {
      if (confirm("Excluir este registro permanentemente?")) {
        await remove(ref(database, `history/${id}`));
        showHistoryModal();
      }
    };

    window.loadHistoryList = async (id) => {
      if (!confirm("Isso irá substituir sua lista atual. Deseja continuar?")) return;
      const snapshot = await get(ref(database, `history/${id}`));
      const historyData = snapshot.val();
      if (historyData && historyData.items) {
        await set(ref(database, 'shoppingList'), {});
        await set(ref(database, 'listName'), historyData.name + " (Restaurada)");
        for (const item of historyData.items) {
          const { id: oldId, ...itemToSave } = item;
          await push(ref(database, 'shoppingList'), itemToSave);
        }
        closeHistoryModal();
        alert("Lista restaurada com sucesso!");
      }
    };
  </script>
</body>
</html>
